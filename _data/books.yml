- name: The C Programming Language
  cover: https://noonafter.cn/assets/images/books/s29586132.jpg
  start_date: 2024.1.25
  finish_date: 2024.5.29
  douban_link: https://book.douban.com/subject/1236999/
  note: C89标准的经典教材，初学者入门必读，但是不要止步于此，更重要的还是要学习计算机组成和编译相关的知识，每隔一段时间再读总会有新的收获。

- name: 长安的荔枝
  cover: https://noonafter.cn/assets/images/books/s34327482.jpg
  start_date: 2025.4.5
  finish_date: 2025.4.6
  douban_link: https://book.douban.com/subject/36104107/
  note: 一骑红尘妃子笑，无人知是荔枝来。见微知著，一个小人物的故事，却深刻地反映了一个朝代衰亡的原因，幽默搞笑的故事，曲折有趣的情节，性格鲜明的人物，令人捧腹大笑的同时又感慨万千。

- name: 深入理解计算机系统
  cover: https://noonafter.cn/assets/images/books/s29195878.jpg
  start_date: 2025.3.1
  finish_date: 2025.12.6
  douban_link: https://book.douban.com/subject/26912767/
  note: 一句话评价：计算机系统入门的最强书籍，没有之一！全书将整个计算机中最核心的东西串联到了一起，形成一个整体，读书的过程不仅是一种学习，更是一种审美！课后的Lab设计也非常精妙，这里放上<a href="https://github.com/noonafter/csapp_labs" target="_blank">个人Lab答案</a>仅供参考

- name: C++ Primer
  cover: https://noonafter.cn/assets/images/books/s27023182.jpg
  start_date: 2024.7.1
  finish_date: 2025.5.8
  douban_link: https://book.douban.com/subject/25708312/
  note: C++11入门的经典教材，内容全面，其中明确并补充了很多C中模糊或者缺失的概念，基础内容必须仔细阅读，包括表达式、函数、类、容器、模版等章节。但是部分细节过于繁琐且使用频率不高，建议选择性阅读，碰到问题时再来查阅。