<script>
  fetch('https://waline-server-nine-murex.vercel.app/api/article?path=' + encodeURIComponent(location.pathname), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var el = document.querySelector('.js-pageview');
    if (el && d.data && d.data[0]) el.innerText = d.data[0].time || 0;
  });
</script>
